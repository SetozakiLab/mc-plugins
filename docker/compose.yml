services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: mc-plugins-dev
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.10"
      MEMORY: "2G"
      MODE: "creative"
      DIFFICULTY: "peaceful"
      ONLINE_MODE: "FALSE"
      ENABLE_COMMAND_BLOCK: "TRUE"
      MOTD: "mc-plugins dev server"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
